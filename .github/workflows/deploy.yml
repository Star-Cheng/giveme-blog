name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          SITE_URL: https://star-cheng.github.io
          PUBLIC_GISCUS_REPO: Star-Cheng/giveme-blog
          PUBLIC_GISCUS_REPO_ID: R_kgDOSClJTA
          PUBLIC_GISCUS_CATEGORY: Announcements
          PUBLIC_GISCUS_CATEGORY_ID: DIC_kwDOSClJTM4C7bdC
          PUBLIC_GISCUS_MAPPING: pathname
          PUBLIC_GISCUS_STRICT: '0'
          PUBLIC_GISCUS_REACTIONS_ENABLED: '1'
          PUBLIC_GISCUS_EMIT_METADATA: '0'
          PUBLIC_GISCUS_INPUT_POSITION: bottom
          PUBLIC_GISCUS_LANG: zh-CN
          PUBLIC_BUTTONDOWN_USERNAME: gengyangming
          PUBLIC_BUTTONDOWN_ACTION: https://buttondown.email/api/emails/embed-subscribe/gengyangming

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4